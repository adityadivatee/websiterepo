<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Browser - Update Server</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 { color: #00d2ff; }
        code { background: #222; padding: 5px; border-radius: 5px; color: #ff79c6; }
        .status { margin-top: 20px; font-size: 0.9rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Browser Update Server</h1>
        <p>The latest version is currently: <code>1.1.0</code></p>
        <p>Endpoint: <a href="version.json" style="color: #00d2ff;">/version.json</a></p>
        <div class="status">Server Status: Online</div>
    </div>
</body>
</html>
